<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>MyBatis SQL 日志解析工具</title>
    <style>
        body { font-family: Arial, sans-serif; }
        textarea { width: 100%; height: 220px; }
        pre {
            background: #f6f8fa;
            padding: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>

<h3>MyBatis SQL 日志（粘贴后自动解析）</h3>
<textarea id="log" placeholder="直接粘贴 MyBatis 日志，无需点击按钮"></textarea>

<h3>解析结果</h3>
<pre id="result"></pre>

<script>
const logTextarea = document.getElementById("log");
const resultDom = document.getElementById("result");

/* 监听输入（包含粘贴） */
logTextarea.addEventListener("input", autoParse);
logTextarea.addEventListener("paste", () => {
    // 确保粘贴完成后再解析
    setTimeout(autoParse, 0);
});

function autoParse() {
    const log = logTextarea.value;

    if (!log.includes("Preparing:") || !log.includes("Parameters:")) {
        resultDom.textContent = "";
        return;
    }

    try {
        resultDom.textContent = parseSql(log);
    } catch (e) {
        resultDom.textContent = "解析失败：" + e.message;
    }
}

function parseSql(log) {
    /* ========= 1. 提取 SQL ========= */
    const sqlStart = log.indexOf("Preparing:") + "Preparing:".length;
    const sqlEnd = log.indexOf("Parameters:");
    let sql = log.substring(sqlStart, sqlEnd);

    // 🔥 换行是噪音，直接删除
    sql = sql
        .replace(/\r?\n\s*/g, '')
        .replace(/\s+/g, ' ')
        .trim();
		
		// 🔥 如果 SQL 中混入了下一条日志头，直接截断
		sql = sql.replace(
			/\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\.\d{3}\s+\[[^\]]+].*$/,
			''
		);


    /* ========= 2. 提取 Parameters（只取当前行） ========= */
    const paramsStart = log.indexOf("Parameters:") + "Parameters:".length;
    let paramsStr = log.substring(paramsStart);
    paramsStr = paramsStr.split(/\r?\n/)[0].trim();

    const params = paramsStr
        .split(/,(?=[^,]+\()/)
        .map(p => {
            const value = p.substring(0, p.lastIndexOf("(")).trim();
            const type = p.substring(p.lastIndexOf("(") + 1, p.lastIndexOf(")")).trim();
            return { value, type };
        });

    /* ========= 3. 顺序替换 ? ========= */
    let index = 0;
    return sql.replace(/\?/g, () => {
        if (index >= params.length) return "?";
        const { value, type } = params[index++];
        return isStringType(type)
            ? `'${escapeSql(value)}'`
            : value;
    });
}

/* 字符串类型判断 */
function isStringType(type) {
    return [
        "String",
        "Timestamp",
        "Date",
        "LocalDate",
        "LocalDateTime",
        "BigDecimal"
    ].includes(type);
}

/* SQL 转义 */
function escapeSql(str) {
    return str.replace(/'/g, "''");
}
</script>

</body>
</html>
