<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>实时表格转 Markdown</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    textarea {
      width: 100%;
      height: 200px;
      font-family: monospace;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

  <label for="inputText">输入原始数据（使用制表符分隔）：</label>
  <textarea id="inputText" placeholder="member_id\tcreate_time\tpay_time\tproduct_count&#10;..."></textarea>

  <label for="outputText">输出 Markdown 表格：</label>
  <textarea id="outputText" readonly></textarea>

  <script>
    const inputArea = document.getElementById('inputText');
    const outputArea = document.getElementById('outputText');

   inputArea.addEventListener('input', () => {
    const input = inputArea.value.trim();
     if (!input) {
       outputArea.value = '';
       return;
     }
   
     const lines = input.split('\n').map(line => line.trim()).filter(Boolean);
     const rows = lines.map(line => line.split('\t'));
	 //const rows = lines.map(line => line.split(/\s+/));
   
     if (rows.length === 0) return;
   
     const colCount = rows[0].length;
   
     const header = '| ' + rows[0].join(' | ') + ' |';
     const separator = '| ' + Array(colCount).fill('---').join(' | ') + ' |';
     const body = rows.slice(1).map(row => '| ' + row.join(' | ') + ' |').join('\n');
   
     const markdown = [header, separator, body].join('\n');
     outputArea.value = markdown;
   });
  
  

  </script>

</body>
</html>
